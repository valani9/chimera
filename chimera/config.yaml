oracle:
  rss_poll_interval_seconds: 60
  gdelt_poll_interval_seconds: 900
  wikipedia_poll_interval_seconds: 300
  cloudflare_poll_interval_seconds: 900
  dedup_threshold: 0.85
  dedup_num_perm: 128
  cluster_min_size: 3
  novelty_threshold: 0.6
  market_match_threshold: 0.45

  rss_feeds:
    - https://feeds.reuters.com/reuters/worldNews
    - https://feeds.reuters.com/reuters/businessNews
    - https://rss.nytimes.com/services/xml/rss/nyt/World.xml
    - https://feeds.bbci.co.uk/news/world/rss.xml
    - https://www.aljazeera.com/xml/rss/all.xml

  wikipedia_watchlist:
    - "Donald_Trump"
    - "Ukraine"
    - "Federal_Reserve"
    - "Xi_Jinping"
    - "Taiwan"
    - "Bitcoin"
    - "Tariff"
    - "NATO"
    - "Iran"

  cloudflare_countries:
    - "UA"  # Ukraine
    - "RU"  # Russia
    - "CN"  # China
    - "IR"  # Iran
    - "TW"  # Taiwan
    - "MM"  # Myanmar
    - "SD"  # Sudan
    - "SY"  # Syria

hydra:
  debate_rounds: 3
  temperature_agents: 0.7
  temperature_judge: 0.3
  max_tokens_per_agent: 500
  max_tokens_judge: 800

  agents:
    bull:
      name: "Bull"
      backend: "openai"
      model: "gpt-4o"
    bear:
      name: "Bear"
      backend: "anthropic"
      model: "claude-sonnet-4-20250514"
    historian:
      name: "Historian"
      backend: "anthropic"
      model: "claude-sonnet-4-20250514"
    contrarian:
      name: "Contrarian"
      backend: "google"
      model: "gemini-2.0-flash"
    quant:
      name: "Quant"
      backend: "openai"
      model: "gpt-4o"
    judge:
      name: "Judge"
      backend: "anthropic"
      model: "claude-sonnet-4-20250514"

fusion:
  extremize_d: 1.5
  edge_threshold: 0.05
  kelly_multiplier: 0.25
  max_bet_fraction: 0.05
  prob_clamp_min: 0.005
  prob_clamp_max: 0.995
  min_confidence: 0.3

predator:
  vpin_bucket_size: 50
  vpin_window: 200
  whale_threshold_pct: 0.10
  cascade_window_trades: 20
  cascade_threshold: 0.75
  min_market_volume_24h: 10000

polymarket:
  gamma_api_url: "https://gamma-api.polymarket.com"
  clob_api_url: "https://clob.polymarket.com"
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  max_markets: 100

ripple:
  max_depth: 3
  decay_factor: 0.6
  min_relevance: 0.3

server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
